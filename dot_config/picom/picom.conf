backend="xrender"
vsync = true;

active-opacity = 0.9;      # 焦点窗口：90% 不透明，10% 透明
inactive-opacity = 0.5;    # 非焦点窗口：50% 不透明，50% 透明

# rofi 不透明
opacity-rule = [
  "100:class_g     = 'rofi'",
  "100:class_g     = 'Rofi'"
];

wintypes:
{
  menu = { opacity = 1.0; };
  popup_menu = { opacity = 1.0; };
};
